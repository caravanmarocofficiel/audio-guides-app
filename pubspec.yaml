name: audio_guides
description: تطبيق أدلة صوتية سياحية متعددة الدول مع نظام دفع آمن
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.2.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # Audio Playing (Streaming فقط - بدون تحميل)
  just_audio: ^0.9.31
  audio_session: ^0.1.13
  
  # Payment Integration (Apple Pay & Google Pay)
  pay: ^2.0.0
  in_app_purchase: ^3.1.0
  in_app_purchase_android: ^0.3.0
  in_app_purchase_storekit: ^0.3.0
  
  # UI Components
  intl: ^0.18.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.0
  
  # Localization & Routing
  go_router: ^10.0.0
  flutter_localizations:
    sdk: flutter
  
  # Security & Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  
  # Database
  firebase_firestore: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/flags/
    - assets/icons/
    - assets/configs/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
